name: notes_lists
version: "1.0"
description: Handle notes and list management.
priority: medium
intent_category: productivity
use_when: [note/list requests]
required_entities: []
optional_entities: [note_content, list_name, list_item]
detection:
  lexical_hints: [note, remember this, add to my shopping list, list]
  semantic_examples: ["Add milk to my shopping list"]
  entity_hints: {content: optional}
  strong_patterns: ["add <item> to my <list>"]
tools:
  primary: [create_note, create_list, add_list_item, read_list]
  secondary: []
validation: [create list if missing based on preference]
confirmation:
  default: none
response_style: [confirm saved item]
examples: []
non_examples: []

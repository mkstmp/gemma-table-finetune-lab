name: weather
version: "1.0"
description: Handle weather forecast and air quality.
priority: high
intent_category: weather
use_when:
  - user asks weather forecast or AQI
required_entities: [location]
optional_entities: [start_date, end_date, units]
detection:
  lexical_hints: [weather, forecast, rain, temperature, snow, humid, aqi, air quality]
  semantic_examples:
    - Weather in Sunnyvale tomorrow
    - What's AQI in Delhi
  entity_hints:
    location: required
  strong_patterns:
    - weather in <location>
tools:
  primary: [get_weather, get_air_quality]
  secondary: []
validation:
  - ask for location if missing
confirmation:
  default: none
response_style:
  - lead with answer
examples: []
non_examples: []

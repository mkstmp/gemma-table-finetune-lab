name: smart_home
version: "1.0"
description: Handle smart device control and status.
priority: high
intent_category: device_control
use_when: [smart home requests]
required_entities: []
optional_entities: [device_name, room, device_type, action, params]
detection:
  lexical_hints: [turn on, turn off, lock, unlock, thermostat, temperature]
  semantic_examples: ["Turn off bedroom lights"]
  entity_hints: {device: optional, action: optional}
  strong_patterns: ["turn <device> on"]
tools:
  primary: [list_devices, get_device_state, control_device]
  secondary: []
validation: [resolve device uniquely]
confirmation:
  default: implicit
  conditions: [unlocking doors requires explicit confirmation]
response_style: [state final device state]
examples: []
non_examples: []

name: reminders_timers_alarms
version: "1.0"
description: Handle timers alarms reminders.
priority: high
intent_category: productivity
use_when:
  - user asks set/cancel timer alarm reminder
required_entities: []
optional_entities: [duration, datetime, reminder_text, recurrence, location_trigger]
detection:
  lexical_hints: [timer, alarm, remind me, reminder, wake me]
  semantic_examples:
    - set a timer for 10 minutes
    - remind me to call mom at 7 PM
  entity_hints:
    duration: optional
    datetime: optional
    reminder_text: optional
  strong_patterns:
    - remind me to <task> at <datetime>
tools:
  primary: [set_timer, cancel_timer, set_alarm, create_reminder, list_reminders]
  secondary: []
validation:
  - if reminder text missing ask what
  - if reminder time missing ask when
confirmation:
  default: none
response_style:
  - confirm what was scheduled
examples: []
non_examples: []

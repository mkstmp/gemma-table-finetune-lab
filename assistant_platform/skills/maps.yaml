name: maps_navigation
version: "1.0"
description: Handle places directions ETA traffic.
priority: medium
intent_category: navigation
use_when: [navigation and traffic requests]
required_entities: []
optional_entities: [origin, destination, mode]
detection:
  lexical_hints: [navigate, directions, route, traffic, eta]
  semantic_examples: ["Navigate to SFO"]
  entity_hints: {destination: optional}
  strong_patterns: ["navigate to <destination>"]
tools:
  primary: [search_places, get_directions, get_eta, get_traffic]
  secondary: []
validation: [resolve destination before directions]
confirmation:
  default: none
response_style: [lead with ETA]
examples: []
non_examples: []
